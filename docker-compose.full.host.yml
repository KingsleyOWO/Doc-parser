services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend-full
    network_mode: host
    environment:
      SEMARK_HOST: 0.0.0.0
      SEMARK_PORT: ${SEMARK_PORT:-${DOC_PARSER_PORT:-8585}}
      SEMARK_WORKSPACE_PATH: /data/workspace
      SEMARK_DATABASE_PATH: /data/workspace/doc_parser.db
      SEMARK_ENABLE_LOCAL_PATH_INGEST: "false"
      SEMARK_CORS_ORIGINS: '["http://localhost:${SEMARK_FRONTEND_PORT:-${DOC_PARSER_FRONTEND_PORT:-5070}}","http://127.0.0.1:${SEMARK_FRONTEND_PORT:-${DOC_PARSER_FRONTEND_PORT:-5070}}"]'
      SEMARK_CORS_ALLOW_PRIVATE_LAN: "false"
      SEMARK_MINERU_CLI_PATH: mineru
      SEMARK_MINERU_MODEL_SOURCE: ${SEMARK_MINERU_MODEL_SOURCE:-${DOC_PARSER_MINERU_MODEL_SOURCE:-huggingface}}
      SEMARK_MINERU_API_URL: ${SEMARK_MINERU_API_URL:-${DOC_PARSER_MINERU_API_URL:-}}
      SEMARK_VLM_BASE_URL: ${SEMARK_VLM_BASE_URL:-${DOC_PARSER_VLM_BASE_URL:-http://127.0.0.1:11434/v1}}
      SEMARK_VLM_API_KEY: ${SEMARK_VLM_API_KEY:-${DOC_PARSER_VLM_API_KEY:-ollama}}
      SEMARK_VLM_MODEL: ${SEMARK_VLM_MODEL:-${DOC_PARSER_VLM_MODEL:-}}
      SEMARK_REVIEW_VLM_BASE_URL: ${SEMARK_REVIEW_VLM_BASE_URL:-${DOC_PARSER_REVIEW_VLM_BASE_URL:-}}
      SEMARK_REVIEW_VLM_API_KEY: ${SEMARK_REVIEW_VLM_API_KEY:-${DOC_PARSER_REVIEW_VLM_API_KEY:-}}
      SEMARK_REVIEW_VLM_MODEL: ${SEMARK_REVIEW_VLM_MODEL:-${DOC_PARSER_REVIEW_VLM_MODEL:-}}
    volumes:
      - doc-parser-workspace:/data/workspace
      - mineru-cache:/root/.cache

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    network_mode: host
    environment:
      VITE_API_PROXY_TARGET: http://127.0.0.1:${SEMARK_PORT:-${DOC_PARSER_PORT:-8585}}
    command: ["sh", "-c", "npm run dev -- --host 0.0.0.0 --port ${SEMARK_FRONTEND_PORT:-${DOC_PARSER_FRONTEND_PORT:-5070}}"]
    depends_on:
      - backend

volumes:
  doc-parser-workspace:
  mineru-cache:
